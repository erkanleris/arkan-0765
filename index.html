<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="أسئلة أركان - تطبيق موبايل متكامل للأسئلة والدردشة والاقتباسات">
    <meta name="keywords" content="أسئلة, دردشة, اقتباسات, عبارات, مجتمع">
    <title>أسئلة أركان - تطبيق مجتمعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- شاشة الدخول -->
        <div id="loginScreen" class="login-screen active">
            <div class="login-container">
                <div class="logo-section">
                    <span class="logo-emoji">✨</span>
                    <h1>أسئلة أركان</h1>
                    <p>منصة مجتمعية للأسئلة والحوار</p>
                </div>
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="userName">اسمك</label>
                        <input type="text" id="userName" placeholder="أدخل اسمك" required>
                    </div>
                    <div class="form-group">
                        <label for="userAge">عمرك</label>
                        <input type="number" id="userAge" placeholder="أدخل عمرك" min="1" max="120" required>
                    </div>
                    <button type="submit" class="btn-login">دخول</button>
                </form>
            </div>
        </div>

        <!-- التطبيق الرئيسي -->
        <div id="mainApp" class="main-app" style="display: none;">
            <!-- Header -->
            <header class="app-header">
                <div class="header-content">
                    <h1 id="headerTitle">أسئلة أركان</h1>
                    <div class="active-users-badge">
                        <span class="badge-icon">👥</span>
                        <span id="activeUsersCount">1</span>
                    </div>
                </div>
            </header>

            <!-- محتوى الصفحات -->
            <main class="app-main">
                <!-- صفحة الأسئلة -->
                <div id="questionsPage" class="page active">
                    <div class="page-header">
                        <h2>الأسئلة</h2>
                        <button id="randomQuestionBtn" class="btn-icon">🎲</button>
                    </div>
                    <div class="search-bar">
                        <input type="text" id="questionSearch" placeholder="ابحث عن سؤال...">
                        <button class="search-btn">🔍</button>
                    </div>
                    <div id="questionsList" class="questions-list">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                </div>

                <!-- صفحة الدردشة -->
                <div id="chatPage" class="page">
                    <div class="page-header">
                        <h2>الدردشة الجماعية</h2>
                        <span class="online-count" id="onlineCount">1 نشيط</span>
                    </div>
                    <div id="chatMessages" class="chat-messages">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="اكتب رسالة...">
                        <button id="sendChatBtn" class="btn-send">إرسال</button>
                    </div>
                </div>

                <!-- صفحة الاقتباسات -->
                <div id="quotesPage" class="page">
                    <div class="page-header">
                        <h2>الاقتباسات</h2>
                        <button id="randomQuoteBtn" class="btn-icon">✨</button>
                    </div>
                    <div id="quotesList" class="quotes-list">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                    <div class="add-quote-section">
                        <textarea id="quoteInput" placeholder="أضف اقتباس جديد..."></textarea>
                        <button id="addQuoteBtn" class="btn-primary">نشر اقتباس</button>
                    </div>
                </div>

                <!-- صفحة العبارات -->
                <div id="phrasesPage" class="page">
                    <div class="page-header">
                        <h2>العبارات</h2>
                        <button id="randomPhraseBtn" class="btn-icon">💬</button>
                    </div>
                    <div id="phrasesList" class="phrases-list">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                    <div class="add-phrase-section">
                        <textarea id="phraseInput" placeholder="أضف عبارة جديدة..."></textarea>
                        <button id="addPhraseBtn" class="btn-primary">نشر عبارة</button>
                    </div>
                </div>

                <!-- صفحة الملف الشخصي -->
                <div id="profilePage" class="page">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profileAvatar">👤</div>
                        <h2 id="profileName">الملف الشخصي</h2>
                        <p id="profileAge" class="profile-age"></p>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="statComments">0</span>
                            <span class="stat-label">تعليقات</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="statQuotes">0</span>
                            <span class="stat-label">اقتباسات</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="statPhrases">0</span>
                            <span class="stat-label">عبارات</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button id="editProfileBtn" class="btn-secondary">تعديل الملف</button>
                        <button id="logoutBtn" class="btn-danger">تسجيل الخروج</button>
                    </div>
                </div>
            </main>

            <!-- قائمة التنقل السفلية -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-page="questionsPage">
                    <span class="nav-icon">❓</span>
                    <span class="nav-label">أسئلة</span>
                </button>
                <button class="nav-item" data-page="chatPage">
                    <span class="nav-icon">💬</span>
                    <span class="nav-label">دردشة</span>
                </button>
                <button class="nav-item" data-page="quotesPage">
                    <span class="nav-icon">📖</span>
                    <span class="nav-label">اقتباسات</span>
                </button>
                <button class="nav-item" data-page="phrasesPage">
                    <span class="nav-icon">✍️</span>
                    <span class="nav-label">عبارات</span>
                </button>
                <button class="nav-item" data-page="profilePage">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">ملفي</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- Modal لعرض السؤال كاملاً -->
    <div id="questionModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="question-full">
                <h2 id="questionTitle"></h2>
                <div class="question-comments" id="questionComments">
                    <!-- يتم ملؤها بـ JavaScript -->
                </div>
                <div class="comment-input">
                    <textarea id="commentInput" placeholder="أضف تعليق..."></textarea>
                    <button id="addCommentBtn" class="btn-primary">إضافة تعليق</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
